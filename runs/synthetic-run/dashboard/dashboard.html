<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Attribution Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#333}
header{background:#1a1a2e;color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:22px;font-weight:700}
.model-select{display:flex;align-items:center;gap:8px}
.model-select label{font-size:13px;opacity:.8}
.model-select select{padding:6px 12px;border-radius:6px;border:none;font-size:14px}
nav{background:#fff;border-bottom:1px solid #ddd;display:flex;padding:0 24px}
nav button{padding:12px 20px;border:none;background:none;cursor:pointer;font-size:14px;font-weight:500;color:#666;border-bottom:3px solid transparent;transition:.2s}
nav button.active{color:#1a1a2e;border-bottom-color:#4285F4}
nav button:hover{color:#333}
main{max-width:1400px;margin:0 auto;padding:24px}
.view{display:none}
.view.active{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card .label{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.card .value{font-size:28px;font-weight:700;margin-top:4px}
.card .sub{font-size:12px;color:#999;margin-top:4px}
.chart-container{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:24px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:10px 12px;background:#f8f9fa;border-bottom:2px solid #dee2e6;cursor:pointer;white-space:nowrap}
th:hover{background:#e9ecef}
td{padding:10px 12px;border-bottom:1px solid #eee}
tr:hover{background:#f8f9fa}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge-green{background:#e8f5e9;color:#2e7d32}
.badge-amber{background:#fff8e1;color:#f57f17}
.badge-red{background:#ffebee;color:#c62828}
.funnel{max-width:700px;margin:0 auto 24px}
.funnel-stage{padding:16px;margin:4px 0;color:#fff;border-radius:6px;display:flex;justify-content:space-between;align-items:center;transition:.3s}
.funnel-stage:hover{transform:scale(1.01)}
.funnel-stage .stage-name{font-weight:600}
.funnel-stage .stage-metrics{text-align:right;font-size:13px}
.scenario-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.scenario-card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer;border:2px solid transparent;transition:.2s}
.scenario-card:hover{border-color:#4285F4}
.scenario-card.selected{border-color:#4285F4;background:#f0f7ff}
.scenario-card h3{font-size:16px;margin-bottom:8px}
.scenario-card .delta{font-size:24px;font-weight:700;margin:8px 0}
.scenario-card .delta.positive{color:#2e7d32}
.scenario-card .delta.negative{color:#c62828}
.scenario-card .confidence{font-size:12px;color:#888}
.slider-group{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:24px}
.slider-row{display:flex;align-items:center;gap:12px;padding:8px 0}
.slider-row label{width:160px;font-size:14px;font-weight:500}
.slider-row input[type=range]{flex:1}
.slider-row .pct{width:50px;text-align:right;font-weight:600}
.alloc-total{text-align:right;font-size:14px;font-weight:600;padding:8px 0}
.alloc-total.warn{color:#f57f17}
.narrative-view{max-width:720px;margin:0 auto;background:#fff;border-radius:10px;padding:40px;box-shadow:0 1px 3px rgba(0,0,0,.08);line-height:1.7}
.narrative-view h2{font-size:18px;font-weight:700;margin:24px 0 12px;color:#1a1a2e}
.narrative-view h2:first-child{margin-top:0}
.narrative-view p{margin-bottom:12px;font-size:15px}
.copy-btn{background:#4285F4;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;margin-bottom:16px}
.copy-btn:hover{background:#3367d6}
.detail-panel{background:#f8f9fa;border-radius:8px;padding:16px;margin-top:16px}
.drop-panel{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-top:16px}
.rep-table{margin-top:16px}
.rep-flagged{background:#fff3e0!important}
.breadcrumb{font-size:13px;color:#666;margin-bottom:12px}
.breadcrumb a{color:#4285F4;cursor:pointer;text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
</style>
</head>
<body>
<header>
<h1>Pipeline Attribution Dashboard</h1>
<div class="model-select">
<label>Attribution Model:</label>
<select id="modelSelector" onchange="onModelChange()">
<option value="first_touch">First-Touch</option>
<option value="last_touch">Last-Touch</option>
<option value="linear">Linear</option>
<option value="time_decay">Time-Decay</option>
<option value="w_shaped" selected>W-Shaped</option>
</select>
</div>
</header>
<nav>
<button class="active" onclick="showView('attribution',this)">Attribution</button>
<button onclick="showView('velocity',this)">Funnel Velocity</button>
<button onclick="showView('performance',this)">Channel Performance</button>
<button onclick="showView('scenarios',this)">Scenario Planning</button>
<button onclick="showView('narrative',this)">Narrative</button>
</nav>
<main>

<!-- VIEW 1: ATTRIBUTION -->
<section id="view-attribution" class="view active">
<div class="cards" id="attr-cards"></div>
<div id="attr-breadcrumb" class="breadcrumb"></div>
<div class="chart-container"><canvas id="attrChart" height="300"></canvas></div>
<div id="attr-detail"></div>
</section>

<!-- VIEW 2: FUNNEL VELOCITY -->
<section id="view-velocity" class="view">
<div class="funnel" id="funnel-diagram"></div>
<div class="drop-panel" id="drop-panel"></div>
<div class="chart-container rep-table" id="rep-table"></div>
</section>

<!-- VIEW 3: CHANNEL PERFORMANCE -->
<section id="view-performance" class="view">
<div class="chart-container"><table id="perf-table"></table></div>
</section>

<!-- VIEW 4: SCENARIO PLANNING -->
<section id="view-scenarios" class="view">
<div class="cards" id="scenario-baseline"></div>
<div class="scenario-cards" id="scenario-cards"></div>
<div id="scenario-detail" class="detail-panel" style="display:none"></div>
<h3 style="margin:24px 0 12px">Custom Scenario Builder</h3>
<div class="slider-group" id="slider-group"></div>
<div class="cards" id="custom-projections"></div>
</section>

<!-- VIEW 5: NARRATIVE -->
<section id="view-narrative" class="view">
<div class="narrative-view" id="narrative-content"></div>
</section>
</main>

function fmt(n){if(n==null)return'—';if(Math.abs(n)>=1e6)return'$'+(n/1e6).toFixed(1)+'M';if(Math.abs(n)>=1e3)return'$'+(n/1e3).toFixed(0)+'K';return'$'+n.toFixed(0)}
function fmtN(n){if(n==null)return'—';return n.toLocaleString()}
function fmtPct(n){if(n==null)return'—';return n.toFixed(1)+'%'}

// VIEW 1: ATTRIBUTION
function renderAttribution(){
  const m=currentModel;
  const cs=ATTRIBUTION_DATA.channel_summary;
  const meta=ATTRIBUTION_DATA.metadata;
  
  document.getElementById('attr-cards').innerHTML=`
    <div class="card"><div class="label">Total Pipeline</div><div class="value">${fmt(meta.total_pipeline_attributed)}</div></div>
    <div class="card"><div class="label">Deals Analyzed</div><div class="value">${meta.total_deals_processed}</div></div>
    <div class="card"><div class="label">Channels</div><div class="value">${CHANNELS.length}</div></div>
    <div class="card"><div class="label">Model</div><div class="value">${MODEL_LABELS[m]}</div></div>`;
  
  document.getElementById('attr-breadcrumb').innerHTML='<a onclick="renderAttribution()">All Channels</a>';
  
  const labels=CHANNELS.slice().sort((a,b)=>(cs[a]?.[m]?.rank||99)-(cs[b]?.[m]?.rank||99));
  const values=labels.map(ch=>cs[ch]?.[m]?.pipeline_credited||0);
  const colors=labels.map(ch=>COLORS[ch]);
  
  if(attrChart){attrChart.destroy()}
  const ctx=document.getElementById('attrChart').getContext('2d');
  attrChart=new Chart(ctx,{type:'bar',data:{labels,datasets:[{label:'Pipeline Credited',data:values,backgroundColor:colors}]},
    options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:t=>fmt(t.raw)}}},
    scales:{y:{ticks:{callback:v=>fmt(v)}}},
    onClick:(e,els)=>{if(els.length>0){const ch=labels[els[0].index];drillChannel(ch)}}}});
  
  document.getElementById('attr-detail').innerHTML='<p style="color:#888;text-align:center;padding:20px">Click a bar to drill into campaign detail</p>';
}

function drillChannel(ch){
  const m=currentModel;
  const campaigns=ATTRIBUTION_DATA.campaign_detail[ch]||{};
  document.getElementById('attr-breadcrumb').innerHTML=`<a onclick="renderAttribution()">All Channels</a> &gt; ${ch}`;
  let html='<div class="chart-container"><table><tr><th>Campaign</th><th>Rank</th><th>Pipeline Credited</th><th>Deals Touched</th><th>Avg Credit/Deal</th><th>% of Total</th></tr>';
  const cps=Object.keys(campaigns).sort((a,b)=>(campaigns[a][m]?.rank||99)-(campaigns[b][m]?.rank||99));
  for(const cp of cps){
    const d=campaigns[cp][m]||{};
    html+=`<tr onclick="drillDeals('${ch.replace(/'/g,"\'")}','${cp.replace(/'/g,"\'")}')"><td>${cp}</td><td>${d.rank||'—'}</td><td>${fmt(d.pipeline_credited)}</td><td>${d.deals_touched||0}</td><td>${fmt(d.avg_credit_per_deal)}</td><td>${fmtPct(d.pct_of_total)}</td></tr>`;
  }
  html+='</table></div>';
  document.getElementById('attr-detail').innerHTML=html;
}

function drillDeals(ch,cp){
  const m=currentModel;
  document.getElementById('attr-breadcrumb').innerHTML=`<a onclick="renderAttribution()">All Channels</a> &gt; <a onclick="drillChannel('${ch.replace(/'/g,"\\'")}')">${ch}</a> &gt; ${cp}`;
  const deals=ATTRIBUTION_DATA.deal_attribution.filter(d=>d.touchpoints.some(t=>t.channel===ch&&t.campaign_name===cp))
    .sort((a,b)=>{const ac=a.touchpoints.filter(t=>t.channel===ch&&t.campaign_name===cp).reduce((s,t)=>s+t.credits[m],0);
    const bc=b.touchpoints.filter(t=>t.channel===ch&&t.campaign_name===cp).reduce((s,t)=>s+t.credits[m],0);return bc-ac}).slice(0,20);
  let html='<div class="chart-container"><table><tr><th>Deal ID</th><th>Company</th><th>Deal Size</th><th>Outcome</th><th>Touchpoints</th><th>Credit ('+MODEL_LABELS[m]+')</th></tr>';
  for(const d of deals){
    const credit=d.touchpoints.filter(t=>t.channel===ch&&t.campaign_name===cp).reduce((s,t)=>s+t.credits[m],0);
    html+=`<tr><td>${d.deal_id}</td><td>${d.company_name}</td><td>${fmt(d.deal_size)}</td><td>${d.deal_outcome}</td><td>${d.touchpoint_count}</td><td>${fmt(credit)}</td></tr>`;
  }
  html+='</table></div>';
  document.getElementById('attr-detail').innerHTML=html;
}

  const stages=[
    {name:'Lead',count:v.metadata.deal_counts_by_stage.lead,color:'#4285F4'},
    {name:'MQL',count:v.metadata.deal_counts_by_stage.mql,color:'#34A853',trans:'lead_to_mql'},
    {name:'SQL',count:v.metadata.deal_counts_by_stage.sql,color:'#FBBC04',trans:'mql_to_sql'},
    {name:'Opportunity',count:v.metadata.deal_counts_by_stage.opportunity,color:'#EA4335',trans:'sql_to_opp'},
    {name:'Closed',count:v.metadata.deal_counts_by_stage.closed,color:'#7B1FA2',trans:'opp_to_closed'}
  ];
  const bottleneckTransitions=v.bottleneck_flags.map(b=>b.transition);
  let html='';
  for(let i=0;i<stages.length;i++){
    const s=stages[i];
    const width=90-i*12;
    const isBottleneck=s.trans&&bottleneckTransitions.includes(s.trans);
    const bg=isBottleneck?'#c62828':s.color;
    let metrics='';
    if(s.trans){
      const sv=v.stage_velocity[s.trans]?.overall||{};
      const cr=v.conversion_rates[s.trans]?.overall||{};
      metrics=`${fmtPct(cr.rate)} conv · ${sv.median||'—'}d median`;
    }
    html+=`<div class="funnel-stage" style="background:${bg};width:${width}%;margin-left:${(100-width)/2}%">
      <span class="stage-name">${s.name} (${s.count})</span>
      <span class="stage-metrics">${metrics}${isBottleneck?' ⚠ BOTTLENECK':''}</span></div>`;
  }
  document.getElementById('funnel-diagram').innerHTML=html;
  
  // Drop-off panels
  const transitions=['lead_to_mql','mql_to_sql','sql_to_opp','opp_to_closed'];
  const tLabels={'lead_to_mql':'Lead→MQL','mql_to_sql':'MQL→SQL','sql_to_opp':'SQL→Opp','opp_to_closed':'Opp→Closed'};
  let dropHtml='';
  for(const t of transitions){
    const d=v.drop_off_analysis[t]||{};
    let reasons='';
    if(d.lost_reason_breakdown){
      for(const r of d.lost_reason_breakdown){reasons+=`<div style="font-size:12px">${r.reason}: ${r.count} (${fmtPct(r.pct)})</div>`}
    }
    dropHtml+=`<div class="card"><div class="label">${tLabels[t]}</div><div class="value">${d.deals_dropped||0} dropped</div><div class="sub">${fmtPct(d.drop_rate)} drop rate · ${d.still_open_count||0} still open</div>${reasons}</div>`;
  }
  document.getElementById('drop-panel').innerHTML=dropHtml;
  
  // Rep table
  let repHtml='<h3>Sales Rep Analysis</h3><table><tr><th>Rep</th><th>Deals</th><th>Won</th><th>Lost</th><th>Open</th><th>Win Rate</th><th>Avg Cycle (Won)</th><th>Flag</th></tr>';
  for(const r of v.sales_rep_analysis){
    const cls=r.bottleneck_flag?'rep-flagged':'';
    repHtml+=`<tr class="${cls}"><td>${r.rep_name}</td><td>${r.total_deals}</td><td>${r.won}</td><td>${r.lost}</td><td>${r.open}</td><td>${fmtPct(r.win_rate)}</td><td>${r.avg_cycle_won!=null?r.avg_cycle_won+'d':'—'}</td><td>${r.bottleneck_flag?'<span class="badge badge-red">'+r.bottleneck_flag.type+'</span>':'—'}</td></tr>`;
  }
  repHtml+='</table>';
  document.getElementById('rep-table').innerHTML=repHtml;
}

// VIEW 3: CHANNEL PERFORMANCE
function renderPerformance(){
  const m=currentModel;
  const lb=PERFORMANCE_DATA.channel_leaderboard;
  const flags=PERFORMANCE_DATA.diagnostic_flags;
  
  let html='<table id="perf-sort-table"><tr><th onclick="sortPerf(0)">Channel</th><th onclick="sortPerf(1)">Rank</th><th onclick="sortPerf(2)">Pipeline Influenced</th><th onclick="sortPerf(3)">Spend</th><th onclick="sortPerf(4)">ROI</th><th onclick="sortPerf(5)">Cost/Opp</th><th onclick="sortPerf(6)">Cost/Won</th><th onclick="sortPerf(7)">Leads</th><th onclick="sortPerf(8)">Conv %</th><th>Flags</th></tr>';
  
  const sorted=Object.keys(lb).sort((a,b)=>(lb[a].by_model[m]?.rank||99)-(lb[b].by_model[m]?.rank||99));
  for(const ch of sorted){
    const d=lb[ch];
    const bm=d.by_model[m]||{};
    const chFlags=flags.filter(f=>f.channel===ch&&f.model===m);
    let badges='';
    for(const f of chFlags){
      if(f.flag_type==='underfunded')badges+='<span class="badge badge-green">Underfunded</span> ';
      if(f.flag_type==='high_volume_low_quality')badges+='<span class="badge badge-amber">High Vol/Low Qual</span> ';
    }
    html+=`<tr><td><span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:${COLORS[ch]};margin-right:6px"></span>${ch}</td><td>${bm.rank||'—'}</td><td>${fmt(bm.pipeline_influenced)}</td><td>${fmt(d.total_spend)}</td><td>${fmtRoi(bm.roi)}</td><td>${d.cost_per_opp!=null?fmt(d.cost_per_opp):'—'}</td><td>${d.cost_per_won!=null?fmt(d.cost_per_won):'—'}</td><td>${d.leads_generated}</td><td>${fmtPct(d.conversion_lead_to_won)}</td><td>${badges}</td></tr>`;
  }
  html+='</table>';
  document.getElementById('perf-table').innerHTML=html;
}

// VIEW 4: SCENARIOS
function renderScenarios(){
  const m=currentModel;
  const s=SCENARIO_DATA;
  
  document.getElementById('scenario-baseline').innerHTML=`
    <div class="card"><div class="label">Current Pipeline</div><div class="value">${fmt(s.metadata.current_pipeline)}</div></div>
    <div class="card"><div class="label">Total Budget</div><div class="value">${fmt(s.metadata.total_budget)}</div></div>
    <div class="card"><div class="label">Current ROI</div><div class="value">${fmtRoi(s.metadata.current_roi)}</div></div>`;
  
  let html='';
  for(const sc of s.scenarios){
    const p=sc.projections[m]||{};
    const isPos=p.pipeline_delta_pct>=0;
    html+=`<div class="scenario-card" onclick="selectScenario('${sc.scenario_id}')">
      <h3>${sc.name}</h3>
      <div class="delta ${isPos?'positive':'negative'}">${isPos?'+':''}${fmtPct(p.pipeline_delta_pct)}</div>
      <div style="font-size:13px">${fmt(p.projected_pipeline)} projected pipeline</div>
      <div class="confidence">${p.confidence} confidence</div></div>`;
  }
  document.getElementById('scenario-cards').innerHTML=html;
  
  // Sliders
  const cp=s.custom_scenario_parameters;
  let sliderHtml='';
  for(const ch of CHANNELS){
    const pct=cp.current_allocation[ch]||0;
    sliderHtml+=`<div class="slider-row">
      <label><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${COLORS[ch]};margin-right:6px"></span>${ch}</label>
      <input type="range" min="0" max="50" step="0.5" value="${pct}" oninput="updateSliders()" id="slider-${ch.replace(/\s/g,'-')}">
      <span class="pct" id="pct-${ch.replace(/\s/g,'-')}">${pct.toFixed(1)}%</span></div>`;
  }
  sliderHtml+=`<div class="alloc-total" id="alloc-total"></div>
    <button onclick="resetSliders()" style="padding:6px 16px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;margin-top:8px">Reset</button>`;
  document.getElementById('slider-group').innerHTML=sliderHtml;
  updateSliders();
}

function selectScenario(id){
  const sc=SCENARIO_DATA.scenarios.find(s=>s.scenario_id===id);
  if(!sc)return;
  const m=currentModel;
  const p=sc.projections[m]||{};
  let html=`<h3>${sc.name}</h3><p>${sc.description}</p>
    <div class="cards" style="margin-top:12px">
    <div class="card"><div class="label">Projected Pipeline</div><div class="value">${fmt(p.projected_pipeline)}</div></div>
    <div class="card"><div class="label">Pipeline Delta</div><div class="value">${(p.pipeline_delta>=0?'+':'')}${fmtPct(p.pipeline_delta_pct)}</div></div>
    <div class="card"><div class="label">Projected ROI</div><div class="value">${fmtRoi(p.projected_roi)}</div></div>
    <div class="card"><div class="label">Confidence</div><div class="value">${p.confidence}</div></div></div>`;
  if(sc.reallocation.changes.length>0){
    html+='<h4 style="margin-top:16px">Changes:</h4><ul>';
    for(const c of sc.reallocation.changes){
      html+=`<li>${c.channel}: ${fmtPct(c.from_pct)} → ${fmtPct(c.to_pct)} (${c.delta_dollars>=0?'+':''}${fmt(c.delta_dollars)})</li>`;
    }
    html+='</ul>';
  }
  if(sc.assumptions.length>0){
    html+='<h4 style="margin-top:12px">Assumptions:</h4><ul>';
    for(const a of sc.assumptions)html+=`<li style="font-size:13px;color:#666">${a}</li>`;
    html+='</ul>';
  }
  document.getElementById('scenario-detail').style.display='block';
  document.getElementById('scenario-detail').innerHTML=html;
}

function updateSliders(){
  const cp=SCENARIO_DATA.custom_scenario_parameters;
  const m=currentModel;
  let total=0;
  const pcts={};
  for(const ch of CHANNELS){
    const id='slider-'+ch.replace(/\s/g,'-');
    const val=parseFloat(document.getElementById(id).value);
    pcts[ch]=val;
    total+=val;
    document.getElementById('pct-'+ch.replace(/\s/g,'-')).textContent=val.toFixed(1)+'%';
  }
  const totalEl=document.getElementById('alloc-total');
  totalEl.textContent='Total: '+total.toFixed(1)+'%';
  totalEl.className='alloc-total'+(Math.abs(total-100)>0.5?' warn':'');
  
  let projPipeline=0;
  for(const ch of CHANNELS){
    const newSpend=cp.total_budget*pcts[ch]/100;
    const rate=cp.pipeline_per_dollar[ch]?.[m]||0;
    projPipeline+=newSpend*rate;
  }
  const projRevenue=projPipeline*cp.win_rate;
  const projRoi=cp.total_budget>0?projPipeline/cp.total_budget:0;
  const pipeDelta=projPipeline-cp.current_pipeline;
  const pipeDeltaPct=cp.current_pipeline>0?pipeDelta/cp.current_pipeline*100:0;
  
  document.getElementById('custom-projections').innerHTML=`
    <div class="card"><div class="label">Projected Pipeline</div><div class="value">${fmt(projPipeline)}</div><div class="sub">${pipeDelta>=0?'+':''}${fmtPct(pipeDeltaPct)} vs current</div></div>
    <div class="card"><div class="label">Projected Revenue</div><div class="value">${fmt(projRevenue)}</div></div>
    <div class="card"><div class="label">Projected ROI</div><div class="value">${fmtRoi(projRoi)}</div></div>`;
}

function resetSliders(){
  const cp=SCENARIO_DATA.custom_scenario_parameters;
  for(const ch of CHANNELS){
    const id='slider-'+ch.replace(/\s/g,'-');
    document.getElementById(id).value=cp.current_allocation[ch]||0;
  }
  updateSliders();
}

// VIEW 5: NARRATIVE
function renderNarrative(){
  const n=NARRATIVE_DATA.sections;
  const sections=[
    {key:'executive_summary',title:'Executive Summary'},
    {key:'attribution_insights',title:'Attribution Insights'},
    {key:'funnel_health',title:'Funnel Health'},
    {key:'channel_efficiency',title:'Channel Efficiency'},
    {key:'budget_recommendations',title:'Budget Recommendations'},
    {key:'key_risks',title:'Key Risks & Data Gaps'}
  ];
  let html='<button class="copy-btn" onclick="copyNarrative()">Copy to Clipboard</button>';
  for(const s of sections){
    const content=n[s.key]?.content||'';
    const paragraphs=content.split('\n\n').filter(p=>p.trim());
    html+=`<h2>${s.title}</h2>`;
    for(const p of paragraphs)html+=`<p>${p}</p>`;
  }
  document.getElementById('narrative-content').innerHTML=html;
}

function copyNarrative(){
  const n=NARRATIVE_DATA.sections;
  const sections=['executive_summary','attribution_insights','funnel_health','channel_efficiency','budget_recommendations','key_risks'];
  const titles={'executive_summary':'Executive Summary','attribution_insights':'Attribution Insights','funnel_health':'Funnel Health','channel_efficiency':'Channel Efficiency','budget_recommendations':'Budget Recommendations','key_risks':'Key Risks & Data Gaps'};
  let text='';
  for(const s of sections)text+=titles[s]+'\n\n'+(n[s]?.content||'')+'\n\n';
  navigator.clipboard.writeText(text).then(()=>alert('Copied!'));
}

// Initialize
renderAttribution();
renderVelocity();
renderPerformance();
renderScenarios();
renderNarrative();
</script>
